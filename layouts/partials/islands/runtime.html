  This file is only included when islands are detected in content

{{ $islandRuntime := `
<script>
// Island Architecture Micro-Runner
// Zero JS by default - only loads when islands are present
(function(){
  'use strict';
  
  const loadIsland = async (name, target) => {
    try {
      const module = await import('/islands/' + name + '.js');
      if (module.default) {
        module.default(target);
      }
    } catch (e) {
      console.warn('Failed to load island:', name, e);
    }
  };
  
  const init = () => {
    document.querySelectorAll('[data-island]').forEach(el => {
      const islandName = el.getAttribute('data-island');
      const trigger = el.getAttribute('data-trigger') || 'idle';
      
      const load = () => loadIsland(islandName, el);
      
      if (trigger === 'idle') {
        if ('requestIdleCallback' in window) {
          requestIdleCallback(load);
        } else {
          setTimeout(load, 1);
        }
      } else if (trigger === 'visible') {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              load();
              observer.disconnect();
            }
          });
        }, { rootMargin: '200px' });
        observer.observe(el);
      } else if (trigger === 'interaction') {
        ['click', 'focus', 'touchstart'].forEach(event => {
          el.addEventListener(event, () => {
            load();
          }, { once: true });
        });
      } else {
        load();
      }
    });
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
` }}
